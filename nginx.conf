server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cachea assets versionados por Vite (hash en el nombre del archivo)
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # SPA (react-router con BrowserRouter): cualquier ruta desconocida
    # cae a index.html para que el router del cliente la resuelva.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
